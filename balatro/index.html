<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Balatro Poker Roguelike - Play the poker-based roguelike game">
    <title>Balatro</title>
    <link rel="stylesheet" href="./index.css">
</head>

<body>

    <div class="game-wrap">
        <!-- Header -->
        <div class="top-bar">
            <div class="top-left">
                <span class="bl-icon">🃏</span>
                <span class="title" data-i18n="balatro_title">Balatro</span>
            </div>
            <div class="top-right">
                <button class="fs-btn" id="fs-btn" onclick="toggleFS()" title="Fullscreen">⛶</button>
                <div class="lang-wrap">
                    <select class="lang-sel" id="lang-select" onchange="onLanguageChange(this)"></select>
                    <span class="lang-arr">▼</span>
                </div>
            </div>
        </div>

        <!-- Game area -->
        <div class="game-area" id="game-area">
            <iframe 
                src="./balatro.html" 
                width="100%" 
                height="100%" 
                scrolling="none" 
                frameborder="0"
                allowfullscreen>
            </iframe>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <span class="hint" data-i18n="balatro_tip">Crea la millor mà de pòquer!</span>
            <span class="credit">Poker Roguelike</span>
        </div>
    </div>

    <script src="./../translations.js"></script>
    <script>
        function toggleFS() {
            const wrap = document.querySelector('.game-wrap');
            if (!document.fullscreenElement) {
                (wrap.requestFullscreen || wrap.webkitRequestFullscreen || wrap.msRequestFullscreen).call(wrap);
            } else {
                (document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen).call(document);
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await loadTranslations();
        });
    </script>
</body>

</html>
